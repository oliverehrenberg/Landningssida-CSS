<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-translate="step2DetailTitle">Steg 2: Utvärdera leverantörens lämplighet - Construction Sourcing</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="assets/Favicon.svg" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <div class="scroll-progress"><div class="scroll-progress__bar"></div></div>
    <div id="header-container"></div>
    <script>
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-container').innerHTML = data;
        });
    </script>

    <main class="details-main with-header-space">
      <section class="details-hero">
        <div class="details-hero-icon"><i class="fa-solid fa-shield-halved" aria-hidden="true"></i></div>
        <h1 data-translate="step2DetailTitle"></h1>
        <p data-translate="step2DetailIntro"></p>
      </section>

      <section class="details-section">
        <h2 data-translate="howItWorksTitle">Så fungerar det</h2>
        <div class="details-how-steps">
          <div class="details-step">
            <div class="details-step-number">1</div>
            <div class="details-step-content">
              <h3 data-translate="step2DetailStep1Title"></h3>
              <p data-translate="step2DetailStep1Text"></p>
            </div>
          </div>
          <div class="details-step">
            <div class="details-step-number">2</div>
            <div class="details-step-content">
              <h3 data-translate="step2DetailStep2Title"></h3>
              <p data-translate="step2DetailStep2Text"></p>
            </div>
          </div>
          <div class="details-step">
            <div class="details-step-number">3</div>
            <div class="details-step-content">
              <h3 data-translate="step2DetailStep3Title"></h3>
              <p data-translate="step2DetailStep3Text"></p>
            </div>
          </div>
          <div class="details-step">
            <div class="details-step-number">4</div>
            <div class="details-step-content">
              <h3 data-translate="step2DetailStep4Title"></h3>
              <p data-translate="step2DetailStep4Text"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="details-section">
        <div class="feature-visual-large">
          <img src="assets/leverantorer-step02-info.png" alt="Utvärdera leverantörens lämplighet" />
        </div>
      </section>

      <section class="details-section">
        <h2 data-translate="step2DetailInterfaceTitle"></h2>
        <p data-translate="step2DetailInterfaceDesc"></p>
        <div class="details-features-grid">
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-building"></i></div>
            <h3 data-translate="step2DetailElement1Title"></h3>
            <p data-translate="step2DetailElement1Desc"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-folder-open"></i></div>
            <h3 data-translate="step2DetailElement2Title"></h3>
            <p data-translate="step2DetailElement2Desc"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-star"></i></div>
            <h3 data-translate="step2DetailElement3Title"></h3>
            <p data-translate="step2DetailElement3Desc"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-certificate"></i></div>
            <h3 data-translate="step2DetailElement4Title"></h3>
            <p data-translate="step2DetailElement4Desc"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-hand-pointer"></i></div>
            <h3 data-translate="step2DetailElement5Title"></h3>
            <p data-translate="step2DetailElement5Desc"></p>
          </div>
        </div>
      </section>
    </main>

    <div class="section-divider"></div>
    <div id="footer-container"></div>
    <script>
      fetch('footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-container').innerHTML = data;
        });
    </script>
    
    <div id="popup-root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
    <script src="popup.js"></script>
    <script src="lang.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        
        // Applicera översättning efter DOM är laddad
        const savedLang = localStorage.getItem('language') || 'sv';
        if (typeof applyLanguage === 'function') {
          applyLanguage(savedLang);
        }
      });
    </script>
  </body>
</html>
