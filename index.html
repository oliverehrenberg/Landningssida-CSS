<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Construction Sourcing - Nästa generations upphandlingssystem</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="assets/Favicon.svg" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>

  <body>
    <div class="scroll-progress"><div class="scroll-progress__bar"></div></div>
    <div id="header-container"></div>
    
    <script>
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-container').innerHTML = data;
        });
    </script>
   
    <section class="hero">
      <div class="hero-text-container">
        <!-- <div class="small-top-text" data-translate="heroTopText">
          <span class="highlight-text" data-translate="heroHighlightText">
            <span class="arrow">➔</span>
          </span>
        </div> -->
        <h1 data-translate="heroTitle">
          <span class="highlight-bransch"></span>
        </h1>
        <p class="subtitle" data-translate="heroSubtitle"></p>
        <button class="cta-btn" data-translate="heroCTA" onclick="toggleModal(true)"></button>
      </div>
    </section>

    <section class="features-wrapper section-hidden">
      <div class="features-intro">
        <h2 data-translate="featureTitle"></h2>
        <p class="intro" data-translate="featureIntro"></p>
      </div>

      <div class="features-grid">
        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="building-2"></i></div>
            <h3 data-translate="feature1Title"></h3>
            <p data-translate="feature1Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/leverantorer-step01-alla-företag.png" alt="Alla företag" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="shield-check"></i></div>
            <h3 data-translate="feature2Title"></h3>
            <p data-translate="feature2Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/leverantorer-step02-info.png" alt="Leverantörsinformation" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="message-square-text"></i></div>
            <h3 data-translate="feature3Title"></h3>
            <p data-translate="feature3Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/leverantorer-step03-förslag.png" alt="Förslag och offerter" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="folder-plus"></i></div>
            <h3 data-translate="step4Title"></h3>
            <p data-translate="step4Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/create_new_project.png" alt="Skapa nytt projekt" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="file-text"></i></div>
            <h3 data-translate="step5Title"></h3>
            <p data-translate="step5Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/send quote request.png" alt="Ny offertförfrågan" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="send"></i></div>
            <h3 data-translate="step6Title"></h3>
            <p data-translate="step6Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/6_send quote.png" alt="Skicka offert" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="file-signature"></i></div>
            <h3 data-translate="step7Title"></h3>
            <p data-translate="step7Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/create_agreement.png" alt="Skapa avtal" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="pen-tool"></i></div>
            <h3 data-translate="step8Title"></h3>
            <p data-translate="step8Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/agreement.png" alt="Digitalt avtal" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="clipboard-list"></i></div>
            <h3 data-translate="step9Title"></h3>
            <p data-translate="step9Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/mission.png" alt="Uppdragsstyrning" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="file-check"></i></div>
            <h3 data-translate="step10Title"></h3>
            <p data-translate="step10Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/all-agreement.png" alt="Avtalshantering" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="folder-open"></i></div>
            <h3 data-translate="step11Title"></h3>
            <p data-translate="step11Desc"></p>
            <button class="cta-btn" onclick="toggleModal(true)" data-translate="heroCTA"></button>
          </div>
          <div class="feature-visual">
            <img src="assets/document.png" alt="Projektdokumenthantering" />
          </div>
        </div>
      </div>
    </section>

    <!-- <div id="about-container"></div> -->

    <div class="section-divider"></div>
    <div id="cta-container"></div>

    <div class="section-divider"></div>
    <div id="footer-container"></div>

    <!-- POPUP HTML -->
    <div id="popup-root">
      <div class="popup-overlay" id="newsletterModal">
        <div class="popup-box">
          <button class="close-btn" onclick="toggleModal(false)" data-translate="closeButton"></button>
          <h3 data-translate="popupTitle"></h3>
          <form class="popup-form">
            <input type="email" placeholder="" data-translate="popupEmailPlaceholder" required />
            <div class="phone-input">
              <select id="countrySelect" onchange="updateFlagAndCode()">
                <option value="se" data-code="46" data-translate="countrySE"></option>
                <option value="dk" data-code="45" data-translate="countryDK"></option>
                <option value="no" data-code="47" data-translate="countryNO"></option>
                <option value="fi" data-code="358" data-translate="countryFI"></option>
                <option value="de" data-code="49" data-translate="countryDE"></option>
                <option value="fr" data-code="33" data-translate="countryFR"></option>
                <option value="es" data-code="34" data-translate="countryES"></option>
                <option value="it" data-code="39" data-translate="countryIT"></option>
                <option value="nl" data-code="31" data-translate="countryNL"></option>
                <option value="be" data-code="32" data-translate="countryBE"></option>
              </select>
              <input type="tel" id="phoneNumber" placeholder="" data-translate="popupPhonePlaceholder" required />
            </div>
            <button type="submit" class="submit-btn" data-translate="popupSubmit"></button>
            <button type="button" class="decline-btn" onclick="toggleModal(false)" data-translate="popupDecline"></button>
          </form>
          <p class="disclaimer" data-translate="popupDisclaimer"></p>
        </div>
      </div>

      <div class="popup-overlay" id="confirmationPopup">
        <div class="popup-box">
          <h3 data-translate="confirmationTitle"></h3>
          <p data-translate="confirmationText"></p>
          <button class="submit-btn" onclick="toggleConfirmation(false)" data-translate="confirmationClose"></button>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
    <script src="popup.js"></script>
    <script src="lang.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
      });
    </script>
    <script>
      // IntersectionObserver disabled: using GSAP ScrollTrigger instead
    </script>
  

  </body>
</html>
