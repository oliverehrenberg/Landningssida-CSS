<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Construction Sourcing - Nästa generations upphandlingssystem</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="assets/Favicon.svg" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>

  <body>
    <header class="header">
      <div class="nav-left" style="display: flex; align-items: center; gap: 3rem;">
        <a href="#">
          <img src="assets/logo.png" alt="Construction Sourcing Logo" />
        </a>
        <nav class="nav-links" style="display: flex; gap: 3rem;">
          <a href="#funktioner" data-translate="features"></a>
          <a href="#pricing" data-translate="pricing"></a>
          <a href="#about" data-translate="about"></a>
        </nav>
      </div>
    
      <nav class="nav-right">
        <div class="language-switcher" style="display: flex; gap: 1rem; margin-right: 4rem;">
          <a href="#" onclick="switchLanguage('en'); return false;">
            <img src="assets/uk-flag.svg" alt="English" />
          </a>
          <a href="#" onclick="switchLanguage('sv'); return false;">
            <img src="assets/sweden-flag.svg" alt="Swedish" />
          </a>
        </div>
        <a href="https://app.constructionsourcing.se/meetings/oliver/1?uuid=2780a69b-c613-4548-b234-db59044a3ad4" target="_blank">
          <button class="contact-btn" data-translate="contact"></button>
        </a>
      </nav>
    </header>
   
    <section class="hero">
      <div class="hero-text-container">
        <div class="small-top-text" data-translate="heroTopText">
          <span class="highlight-text" data-translate="heroHighlightText">
            <span class="arrow">➔</span>
          </span>
        </div>
        <h1 data-translate="heroTitle">
          <span class="highlight-bransch"></span>
        </h1>
        <p class="subtitle" data-translate="heroSubtitle"></p>
        <button class="cta-btn" data-translate="heroCTA" onclick="toggleModal(true)"></button>
      </div>
    </section>

    <section class="features-wrapper section-hidden">
      <div class="features-intro">
        <h2 data-translate="featureTitle"></h2>
        <p class="intro" data-translate="featureIntro"></p>
      </div>

      <div class="features-grid">
        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="building-2"></i></div>
            <h3 data-translate="feature1Title"></h3>
            <p data-translate="feature1Desc"></p>
          </div>
          <div class="feature-visual">
            <img src="assets/feature-suppliers.png" alt="Leverantörssökning" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="shield-check"></i></div>
            <h3 data-translate="feature2Title"></h3>
            <p data-translate="feature2Desc"></p>
          </div>
          <div class="feature-visual">
            <img src="assets/feature-resolution.png" alt="Konfliktlösning" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="message-square-text"></i></div>
            <h3 data-translate="feature3Title"></h3>
            <p data-translate="feature3Desc"></p>
          </div>
          <div class="feature-visual">
            <img src="assets/feature-chat.png" alt="Kommunikation" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="file-signature"></i></div>
            <h3 data-translate="feature4Title"></h3>
            <p data-translate="feature4Desc"></p>
          </div>
          <div class="feature-visual">
            <img src="assets/feature-docs.png" alt="Dokumenthantering" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="bot"></i></div>
            <h3 data-translate="feature5Title"></h3>
            <p data-translate="feature5Desc"></p>
          </div>
          <div class="feature-visual">
            <img src="assets/feature-ai.png" alt="AI Support" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="layout-dashboard"></i></div>
            <h3 data-translate="feature6Title"></h3>
            <p data-translate="feature6Desc"></p>
          </div>
          <div class="feature-visual">
            <img src="assets/feature-project.png" alt="Projektverktyg" />
          </div>
        </div>

        <div class="feature-card">
          <div class="feature-content">
            <div class="feature-icon"><i data-lucide="scale"></i></div>
            <h3 data-translate="feature7Title"></h3>
            <p data-translate="feature7Desc"></p>
          </div>
          <div class="feature-visual">
            <img src="assets/feature-legal.png" alt="Juridisk Rådgivning" />
          </div>
        </div>
      </div>
    </section>

    <section id="funktioner" class="features-summary-wrapper section-hidden">
      <h2 data-translate="featuresSummaryTitle"></h2>
      <p class="features-intro2" data-translate="featuresSummaryIntro"></p>
    
      <div class="pricing-cards">
        <div class="pricing-card">
          <h3 data-translate="featuresProjectTitle"></h3>
          <ul class="features-list">
            <li data-translate="featuresProject1"></li>
            <li data-translate="featuresProject2"></li>
            <li data-translate="featuresProject3"></li>
          </ul>
        </div>
    
        <div class="pricing-card">
          <h3 data-translate="featuresConnectTitle"></h3>
          <ul class="features-list">
            <li data-translate="featuresConnect1"></li>
            <li data-translate="featuresConnect2"></li>
            <li data-translate="featuresConnect3"></li>
          </ul>
        </div>
      </div>
    </section>

    <section id="about" class="about-wrapper section-hidden">
      <div class="about-card">
        <div class="about-top">
          <h2 class="about-title"><span class='highlight-bransch' data-translate="aboutTitleHighlight"></span> <span data-translate="aboutTitle"></span></h2>
          <p class="about-subtitle" data-translate="aboutSubtitle"></p>
        </div>
    
        <div class="about-bottom">
          <div class="about-text">
            <h3 data-translate="aboutVisionTitle"></h3>
            <p data-translate="aboutVisionText"></p>
          </div>
        </div>
      </div>
    </section>

    <section id="pricing" class="pricing-wrapper section-hidden">
      <h2 data-translate="pricingTitle"></h2>
      <p class="pricing-intro" data-translate="pricingIntro"></p>
    
      <div class="pricing-cards">
        <div class="pricing-card">
          <h3 data-translate="pricingFreeTitle"></h3>
          <ul class="features-list">
            <li data-translate="pricingFree1"></li>
            <li data-translate="pricingFree2"></li>
            <li data-translate="pricingFree3"></li>
            <li data-translate="pricingFree4"></li>
          </ul>
        </div>
    
        <div class="pricing-card">
          <h3 data-translate="pricingFutureTitle"></h3>
          <ul class="features-list">
            <li data-translate="pricingFuture1"></li>
            <li data-translate="pricingFuture2"></li>
            <li data-translate="pricingFuture3"></li>
            <li data-translate="pricingFuture4"></li>
          </ul>
          <p class="coming-soon-note" data-translate="pricingFutureNote"></p>
        </div>
      </div>
    </section>
    <div class="section-divider"></div>
    <section class="cta-section section-hidden">
      <div class="cta-container">
        <h2 data-translate="newsletterHeading"></h2>
        <p data-translate="newsletterSub"></p>
        <button class="cta-btn" data-translate="heroCTA" onclick="toggleModal(true)"></button>
      </div>
    </section>

    <footer class="section-hidden">
      <div class="footer-column">
        <h4 data-translate="footerContact"></h4>
        <p data-translate="footerEmail"></p>
        <p data-translate="footerPhone"></p>
        <p class="copyright" data-translate="footerCompany"></p>
      </div>
      <div class="footer-column">
        <h4 data-translate="footerAddress"></h4>
        <p data-translate="footerStreet"></p>
        <p data-translate="footerCity"></p>
      </div>
      <div class="footer-column">
        <h4 data-translate="footerSocial"></h4>
        <a href="https://www.linkedin.com/company/construction-sourcing/posts/?feedView=all" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-linkedin"></i>
        </a>
      </div>
      
      <div class="footer-column footer-logo">
        <img src="assets/logo.png" alt="Construction Sourcing Logo" style="height: 50px;"/>
      </div>
    </footer>

    <!-- POPUP HTML -->
    <div id="popup-root">
      <div class="popup-overlay" id="newsletterModal">
        <div class="popup-box">
          <button class="close-btn" onclick="toggleModal(false)" data-translate="closeButton"></button>
          <h3 data-translate="popupTitle"></h3>
          <form class="popup-form">
            <input type="email" placeholder="" data-translate="popupEmailPlaceholder" required />
            <div class="phone-input">
              <select id="countrySelect" onchange="updateFlagAndCode()">
                <option value="se" data-code="46" data-translate="countrySE"></option>
                <option value="dk" data-code="45" data-translate="countryDK"></option>
                <option value="no" data-code="47" data-translate="countryNO"></option>
                <option value="fi" data-code="358" data-translate="countryFI"></option>
                <option value="de" data-code="49" data-translate="countryDE"></option>
                <option value="fr" data-code="33" data-translate="countryFR"></option>
                <option value="es" data-code="34" data-translate="countryES"></option>
                <option value="it" data-code="39" data-translate="countryIT"></option>
                <option value="nl" data-code="31" data-translate="countryNL"></option>
                <option value="be" data-code="32" data-translate="countryBE"></option>
              </select>
              <input type="tel" id="phoneNumber" placeholder="" data-translate="popupPhonePlaceholder" required />
            </div>
            <button type="submit" class="submit-btn" data-translate="popupSubmit"></button>
            <button type="button" class="decline-btn" onclick="toggleModal(false)" data-translate="popupDecline"></button>
          </form>
          <p class="disclaimer" data-translate="popupDisclaimer"></p>
        </div>
      </div>

      <div class="popup-overlay" id="confirmationPopup">
        <div class="popup-box">
          <h3 data-translate="confirmationTitle"></h3>
          <p data-translate="confirmationText"></p>
          <button class="submit-btn" onclick="toggleConfirmation(false)" data-translate="confirmationClose"></button>
        </div>
      </div>
    </div>

    <!-- GSAP Core and ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
    <script src="popup.js"></script>
    <script src="lang.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
      });
    </script>
    <script>
      // IntersectionObserver disabled: using GSAP ScrollTrigger instead
    </script>
  

  </body>
</html>
