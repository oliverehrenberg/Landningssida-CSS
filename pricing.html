<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-translate="pricingPageTitle">Priser - Construction Sourcing</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="assets/Favicon.svg" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>

  <body>
    <div class="scroll-progress"><div class="scroll-progress__bar"></div></div>
    <div id="header-container"></div>

    <!-- Hero Section -->
    <section class="pricing-hero">
      <div class="pricing-hero-content">
        <h1 data-translate="pricingHeroTitle"></h1>
        <p class="pricing-hero-subtitle" data-translate="pricingHeroSubtitle"></p>
        <div class="pricing-hero-features">
          <div class="feature-item">
            <i class="fas fa-check-circle"></i>
            <span data-translate="pricingHeroFeature1"></span>
          </div>
          <div class="feature-item">
            <i class="fas fa-check-circle"></i>
            <span data-translate="pricingHeroFeature2"></span>
          </div>
          <div class="feature-item">
            <i class="fas fa-check-circle"></i>
            <span data-translate="pricingHeroFeature3"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Pricing Section -->
    <section id="pricing" class="pricing-wrapper">
      <h2 data-translate="pricingTitle"></h2>
      <p class="pricing-intro" data-translate="pricingIntro"></p>
      
      <!-- Plan Comparison -->
      <div class="plan-comparison">
        <div class="comparison-card">
          <h3 data-translate="planComparisonTitle"></h3>
          <div class="comparison-options">
            <div class="comparison-option">
              <input type="radio" id="small" name="company-size" checked>
              <label for="small" data-translate="comparisonSmall"></label>
            </div>
            <div class="comparison-option">
              <input type="radio" id="medium" name="company-size">
              <label for="medium" data-translate="comparisonMedium"></label>
            </div>
            <div class="comparison-option">
              <input type="radio" id="large" name="company-size">
              <label for="large" data-translate="comparisonLarge"></label>
            </div>
          </div>
        </div>
      </div>

      <div class="pricing-comparison-table-wrapper">
        <table class="pricing-comparison-table">
          <thead>
            <tr>
              <th></th>
              <th>
                <span data-translate="planFree"></span>
                <span class="free-badge" data-translate="pricingFreeBadge"></span>
              </th>
              <th><span data-translate="planBas"></span></th>
              <th><span data-translate="planPlus"></span></th>
              <th><span data-translate="planPremium"></span></th>
              <th><span data-translate="planEnterprise"></span></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><span data-translate="pricingFeaturePrice"></span></td>
              <td><span data-translate="pricingFreePrice"></span></td>
              <td><span data-translate="pricingBasPrice"></span></td>
              <td><span data-translate="pricingPlusPrice"></span></td>
              <td><span data-translate="pricingPremiumPrice"></span></td>
              <td><span data-translate="pricingEnterprisePrice"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureUsers"></span></td>
              <td><span data-translate="pricingFreeUsers"></span></td>
              <td><span data-translate="pricingBasUsers"></span></td>
              <td><span data-translate="pricingPlusUsers"></span></td>
              <td><span data-translate="pricingPremiumUsers"></span></td>
              <td><span data-translate="pricingEnterpriseUsers"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureProjects"></span></td>
              <td><span data-translate="pricingFreeProjects"></span></td>
              <td><span data-translate="pricingBasProjects"></span></td>
              <td><span data-translate="pricingPlusProjects"></span></td>
              <td><span data-translate="pricingPremiumProjects"></span></td>
              <td><span data-translate="pricingEnterpriseProjects"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureRFQPO"></span></td>
              <td><span data-translate="pricingFreeRFQPO"></span></td>
              <td><span data-translate="pricingBasRFQPO"></span></td>
              <td><span data-translate="pricingPlusRFQPO"></span></td>
              <td><span data-translate="pricingPremiumRFQPO"></span></td>
              <td><span data-translate="pricingEnterpriseRFQPO"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureDocs"></span></td>
              <td><span data-translate="pricingFreeDocs"></span></td>
              <td><span data-translate="pricingBasDocs"></span></td>
              <td><span data-translate="pricingPlusDocs"></span></td>
              <td><span data-translate="pricingPremiumDocs"></span></td>
              <td><span data-translate="pricingEnterpriseDocs"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureLegal"></span></td>
              <td><span data-translate="pricingFreeLegal"></span></td>
              <td><span data-translate="pricingBasLegal"></span></td>
              <td><span data-translate="pricingPlusLegal"></span></td>
              <td><span data-translate="pricingPremiumLegal"></span></td>
              <td><span data-translate="pricingEnterpriseLegal"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureAI"></span></td>
              <td><span data-translate="pricingFreeAI"></span></td>
              <td><span data-translate="pricingBasAI"></span></td>
              <td><span data-translate="pricingPlusAI"></span></td>
              <td><span data-translate="pricingPremiumAI"></span></td>
              <td><span data-translate="pricingEnterpriseAI"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureChat"></span></td>
              <td><span data-translate="pricingFreeChat"></span></td>
              <td><span data-translate="pricingBasChat"></span></td>
              <td><span data-translate="pricingPlusChat"></span></td>
              <td><span data-translate="pricingPremiumChat"></span></td>
              <td><span data-translate="pricingEnterpriseChat"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureNotifications"></span></td>
              <td><span data-translate="pricingFreeNotifications"></span></td>
              <td><span data-translate="pricingBasNotifications"></span></td>
              <td><span data-translate="pricingPlusNotifications"></span></td>
              <td><span data-translate="pricingPremiumNotifications"></span></td>
              <td><span data-translate="pricingEnterpriseNotifications"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureSupport"></span></td>
              <td><span data-translate="pricingFreeSupport"></span></td>
              <td><span data-translate="pricingBasSupport"></span></td>
              <td><span data-translate="pricingPlusSupport"></span></td>
              <td><span data-translate="pricingPremiumSupport"></span></td>
              <td><span data-translate="pricingEnterpriseSupport"></span></td>
            </tr>
            <tr>
              <td><span data-translate="pricingFeatureExtras"></span></td>
              <td><span data-translate="pricingFreeExtras"></span></td>
              <td><span data-translate="pricingBasExtras"></span></td>
              <td><span data-translate="pricingPlusExtras"></span></td>
              <td><span data-translate="pricingPremiumExtras"></span></td>
              <td><span data-translate="pricingEnterpriseExtras"></span></td>
            </tr>
            <tr>
              <td></td>
              <td><button class="pricing-btn" onclick="toggleModal(true)" data-translate="pricingInterestCta"></button></td>
              <td><button class="pricing-btn" onclick="toggleModal(true)" data-translate="pricingInterestCta"></button></td>
              <td><button class="pricing-btn" onclick="toggleModal(true)" data-translate="pricingInterestCta"></button></td>
              <td><button class="pricing-btn" onclick="toggleModal(true)" data-translate="pricingInterestCta"></button></td>
              <td><button class="pricing-btn" onclick="toggleModal(true)" data-translate="pricingInterestCta"></button></td>
            </tr>
          </tbody>
        </table>
      </div>
      <p class="pricing-prelaunch-note" data-translate="pricingPrelaunchNote"></p>
    </section>

    <!-- FAQ Section -->
    <section class="pricing-faq">
      <h2 data-translate="pricingFaqTitle"></h2>
      <div class="faq-container">
        <div class="faq-item">
          <div class="faq-question">
            <h3 data-translate="faqQuestion1"></h3>
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="faq-answer">
            <p data-translate="faqAnswer1"></p>
          </div>
        </div>
        <div class="faq-item">
          <div class="faq-question">
            <h3 data-translate="faqQuestion2"></h3>
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="faq-answer">
            <p data-translate="faqAnswer2"></p>
          </div>
        </div>
        <div class="faq-item">
          <div class="faq-question">
            <h3 data-translate="faqQuestion3"></h3>
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="faq-answer">
            <p data-translate="faqAnswer3"></p>
          </div>
        </div>
      </div>
    </section>

    <div class="section-divider"></div>
    <div id="cta-container"></div>

    <div class="section-divider"></div>
    <div id="footer-container"></div>

    <!-- POPUP HTML -->
    <div id="popup-root">
      <div class="popup-overlay" id="newsletterModal">
        <div class="popup-box">
          <button class="close-btn" onclick="toggleModal(false)" data-translate="closeButton"></button>
          <h3 data-translate="popupTitle"></h3>
          <form class="popup-form">
            <input type="email" placeholder="" data-translate="popupEmailPlaceholder" required />
            <div class="phone-input">
              <select id="countrySelect" onchange="updateFlagAndCode()">
                <option value="se" data-code="46" data-translate="countrySE"></option>
                <option value="dk" data-code="45" data-translate="countryDK"></option>
                <option value="no" data-code="47" data-translate="countryNO"></option>
                <option value="fi" data-code="358" data-translate="countryFI"></option>
                <option value="de" data-code="49" data-translate="countryDE"></option>
                <option value="fr" data-code="33" data-translate="countryFR"></option>
                <option value="es" data-code="34" data-translate="countryES"></option>
                <option value="it" data-code="39" data-translate="countryIT"></option>
                <option value="nl" data-code="31" data-translate="countryNL"></option>
                <option value="be" data-code="32" data-translate="countryBE"></option>
              </select>
              <input type="tel" id="phoneNumber" placeholder="" data-translate="popupPhonePlaceholder" required />
            </div>
            <button type="submit" class="submit-btn" data-translate="popupSubmit"></button>
            <button type="button" class="decline-btn" onclick="toggleModal(false)" data-translate="popupDecline"></button>
          </form>
          <p class="disclaimer" data-translate="popupDisclaimer"></p>
        </div>
      </div>

      <div class="popup-overlay" id="confirmationPopup">
        <div class="popup-box">
          <h3 data-translate="confirmationTitle"></h3>
          <p data-translate="confirmationText"></p>
          <button class="submit-btn" onclick="toggleConfirmation(false)" data-translate="confirmationClose"></button>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
    <script src="popup.js"></script>
    <script src="lang.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        
        // FAQ Toggle
        const faqItems = document.querySelectorAll('.faq-item');
        faqItems.forEach(item => {
          const question = item.querySelector('.faq-question');
          question.addEventListener('click', () => {
            item.classList.toggle('active');
          });
        });

        // Plan Comparison
        const comparisonOptions = document.querySelectorAll('.comparison-option input');
        comparisonOptions.forEach(option => {
          option.addEventListener('change', (e) => {
            // Add logic to highlight recommended plans based on company size
            const selectedSize = e.target.id;
            // Implementation can be added here
          });
        });
      });
    </script>
  </body>
</html>
