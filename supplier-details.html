<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Upptäck hur Construction Sourcing hjälper byggföretag att hitta, granska och samarbeta med rätt leverantörer." />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0f0e17" />
    <title data-translate="supplierDetailsTitle">Leverantörsnätverk - Construction Sourcing</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="assets/Favicon.svg" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <div class="scroll-progress"><div class="scroll-progress__bar"></div></div>
    <div id="header-container"></div>
    <script>
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-container').innerHTML = data;
        });
    </script>

    <main class="details-main with-header-space">
      <section class="details-hero">
        <div class="details-hero-icon"><i class="fa-solid fa-network-wired" aria-hidden="true"></i></div>
        <h1 data-translate="supplierDetailsTitle"></h1>
        <p data-translate="supplierDetailsIntro"></p>
      </section>
      
      <section class="details-section">
        <h2 data-translate="supplierDetailsFeaturesTitle"></h2>
        <div class="details-features-grid">
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-magnifying-glass-dollar"></i></div>
            <h3 data-translate="supplierDetailsFeatureTitle1"></h3>
            <p data-translate="supplierDetailsFeatureDesc1"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-star-half-stroke"></i></div>
            <h3 data-translate="supplierDetailsFeatureTitle2"></h3>
            <p data-translate="supplierDetailsFeatureDesc2"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-file-invoice-dollar"></i></div>
            <h3 data-translate="supplierDetailsFeatureTitle3"></h3>
            <p data-translate="supplierDetailsFeatureDesc3"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-gauge-high"></i></div>
            <h3 data-translate="supplierDetailsFeatureTitle4"></h3>
            <p data-translate="supplierDetailsFeatureDesc4"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-handshake"></i></div>
            <h3 data-translate="supplierDetailsFeatureTitle5"></h3>
            <p data-translate="supplierDetailsFeatureDesc5"></p>
          </div>
        </div>
      </section>

      <section class="details-section">
        <h2 data-translate="supplierDetailsVerificationTitle"></h2>
        <div class="details-verification-info">
          <div class="details-verification-icon"><i class="fa-solid fa-shield-check"></i></div>
          <div class="details-verification-content">
            <h3 data-translate="supplierDetailsVerificationSubtitle"></h3>
            <p data-translate="supplierDetailsVerificationText"></p>
            <ul class="details-verification-list">
              <li data-translate="supplierDetailsVerification1"></li>
              <li data-translate="supplierDetailsVerification2"></li>
              <li data-translate="supplierDetailsVerification3"></li>
              <li data-translate="supplierDetailsVerification4"></li>
            </ul>
          </div>
        </div>
      </section>
      
      <section class="details-section">
        <h2 data-translate="supplierDetailsHowTitle"></h2>
        <div class="details-how-steps">
          <div class="details-step">
            <div class="details-step-number">1</div>
            <h3 data-translate="supplierDetailsStep1Title"></h3>
            <p data-translate="supplierDetailsStep1Text"></p>
          </div>
          <div class="details-step">
            <div class="details-step-number">2</div>
            <h3 data-translate="supplierDetailsStep2Title"></h3>
            <p data-translate="supplierDetailsStep2Text"></p>
          </div>
          <div class="details-step">
            <div class="details-step-number">3</div>
            <h3 data-translate="supplierDetailsStep3Title"></h3>
            <p data-translate="supplierDetailsStep3Text"></p>
          </div>
        </div>
      </section>

      <section class="details-section">
        <h2 data-translate="supplierDetailsBenefitsTitle"></h2>
        <ul class="details-list">
          <li data-translate="supplierDetailsBenefit1"></li>
          <li data-translate="supplierDetailsBenefit2"></li>
          <li data-translate="supplierDetailsBenefit3"></li>
          <li data-translate="supplierDetailsBenefit4"></li>
          <li data-translate="supplierDetailsBenefit5"></li>
        </ul>
      </section>

      <section class="details-section">
        <h2 data-translate="supplierDetailsStatisticsTitle"></h2>
        <div class="details-statistics">
          <div class="details-stat">
            <div class="details-stat-number">93%</div>
            <p data-translate="supplierDetailsStat1"></p>
          </div>
          <div class="details-stat">
            <div class="details-stat-number">4.8/5</div>
            <p data-translate="supplierDetailsStat2"></p>
          </div>
          <div class="details-stat">
            <div class="details-stat-number">+5000</div>
            <p data-translate="supplierDetailsStat3"></p>
          </div>
        </div>
      </section>
      
      <section class="details-cta">
        <h2 data-translate="supplierDetailsCtaTitle"></h2>
        <p data-translate="supplierDetailsCtaText"></p>
        <button class="cta-btn" onclick="toggleModal(true)" data-translate="supplierDetailsCtaBtn"></button>
      </section>
    </main>

    <div class="section-divider"></div>
    <div id="footer-container"></div>
    <script>
      fetch('footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-container').innerHTML = data;
        });
    </script>
    
    <div id="popup-root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
    <script src="popup.js"></script>
    <script src="lang.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        
        // Applicera översättning efter DOM är laddad
        const savedLang = localStorage.getItem('language') || 'sv';
        if (typeof applyLanguage === 'function') {
          applyLanguage(savedLang);
        }
      });
    </script>
  </body>
</html>
