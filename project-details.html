<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Se hur Construction Sourcing strukturerar projekt, roller, dokument och uppföljning i ett gemensamt arbetsflöde." />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0f0e17" />
    <title data-translate="projectDetailsTitle">Projekt & Organisation - Construction Sourcing</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="assets/Favicon.svg" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <div class="scroll-progress"><div class="scroll-progress__bar"></div></div>
    <div id="header-container"></div>
    <script>
      fetch('header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-container').innerHTML = data;
        });
    </script>

    <main class="details-main with-header-space">
      <section class="details-hero">
        <div class="details-hero-icon"><i class="fa-solid fa-diagram-project" aria-hidden="true"></i></div>
        <h1 data-translate="projectDetailsTitle">Projekt &amp; Organisation</h1>
        <p data-translate="projectDetailsIntro">Hantera alla dina byggprojekt på ett ställe. Planera, organisera och samarbeta med ditt team för maximal effektivitet.</p>
      </section>
      
      <section class="details-section">
        <h2 data-translate="projectDetailsFeaturesTitle">Nyckelfunktioner</h2>
        <div class="details-features-grid">
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-folder-plus"></i></div>
            <h3 data-translate="projectDetailsFeatureTitle1"></h3>
            <p data-translate="projectDetailsFeatureDesc1"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-chart-line"></i></div>
            <h3 data-translate="projectDetailsFeatureTitle2"></h3>
            <p data-translate="projectDetailsFeatureDesc2"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-users-gear"></i></div>
            <h3 data-translate="projectDetailsFeatureTitle3"></h3>
            <p data-translate="projectDetailsFeatureDesc3"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-file-shield"></i></div>
            <h3 data-translate="projectDetailsFeatureTitle4"></h3>
            <p data-translate="projectDetailsFeatureDesc4"></p>
          </div>
          <div class="details-feature-card">
            <div class="details-feature-icon"><i class="fa-solid fa-calculator"></i></div>
            <h3 data-translate="projectDetailsFeatureTitle5"></h3>
            <p data-translate="projectDetailsFeatureDesc5"></p>
          </div>
        </div>
      </section>

      <section class="details-section">
        <h2 data-translate="projectDetailsHowTitle"></h2>
        <div class="details-how-steps">
          <div class="details-step">
            <div class="details-step-number">1</div>
            <h3 data-translate="projectDetailsStep1Title"></h3>
            <p data-translate="projectDetailsStep1Text"></p>
          </div>
          <div class="details-step">
            <div class="details-step-number">2</div>
            <h3 data-translate="projectDetailsStep2Title"></h3>
            <p data-translate="projectDetailsStep2Text"></p>
          </div>
          <div class="details-step">
            <div class="details-step-number">3</div>
            <h3 data-translate="projectDetailsStep3Title"></h3>
            <p data-translate="projectDetailsStep3Text"></p>
          </div>
        </div>
      </section>
      
      <section class="details-section">
        <h2 data-translate="projectDetailsBenefitsTitle"></h2>
        <ul class="details-list">
          <li data-translate="projectDetailsBenefit1"></li>
          <li data-translate="projectDetailsBenefit2"></li>
          <li data-translate="projectDetailsBenefit3"></li>
          <li data-translate="projectDetailsBenefit4"></li>
          <li data-translate="projectDetailsBenefit5"></li>
        </ul>
      </section>

      <section class="details-section">
        <h2 data-translate="projectDetailsCaseTitle"></h2>
        <div class="details-case-study">
          <blockquote class="details-quote">
            <p data-translate="projectDetailsCaseQuote"></p>
            <cite data-translate="projectDetailsCaseSource"></cite>
          </blockquote>
          <div class="details-case-content">
            <p data-translate="projectDetailsCaseText"></p>
          </div>
        </div>
      </section>
      
      <section class="details-cta">
        <h2 data-translate="projectDetailsCtaTitle"></h2>
        <p data-translate="projectDetailsCtaText"></p>
        <button class="cta-btn" onclick="toggleModal(true)" data-translate="projectDetailsCtaBtn"></button>
      </section>
    </main>

    <div class="section-divider"></div>
    <div id="footer-container"></div>
    <script>
      fetch('footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-container').innerHTML = data;
        });
    </script>
    
    <div id="popup-root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
    <script src="popup.js"></script>
    <script src="lang.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        
        // Applicera översättning efter DOM är laddad
        const savedLang = localStorage.getItem('language') || 'sv';
        if (typeof applyLanguage === 'function') {
          applyLanguage(savedLang);
        }
      });
    </script>
  </body>
</html>
