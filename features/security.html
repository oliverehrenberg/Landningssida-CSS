<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-translate="securityTitle">Security - Construction Sourcing</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/Favicon.svg" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <div class="scroll-progress"><div class="scroll-progress__bar"></div></div>
    <div id="header-container"></div>
    <script>
      fetch('../header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-container').innerHTML = data;
        });
    </script>

    <!-- Hero Section -->
    <section class="pricing-hero">
      <div class="pricing-hero-content">
        <h1 data-translate="securityTitle"></h1>
        <p class="pricing-hero-subtitle" data-translate="securityIntro"></p>
        <div class="pricing-hero-features">
          <div class="feature-item">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span data-translate="securityUSP1"></span>
          </div>
          <div class="feature-item">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span data-translate="securityUSP2"></span>
          </div>
          <div class="feature-item">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span data-translate="securityUSP3"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Feature Details -->
    <section class="feature-detail-section">
      <h2 data-translate="securityFeaturesTitle"></h2>
      <p class="feature-detail-intro" data-translate="securityIntro"></p>
      <div class="feature-details-grid">
        <div class="feature-detail-card">
          <div class="feature-icon"><i class="fa-solid fa-lock" aria-hidden="true"></i></div>
          <h3 data-translate="endToEndEncryptionTitle"></h3>
          <p data-translate="endToEndEncryptionDesc"></p>
        </div>
        <div class="feature-detail-card">
          <div class="feature-icon"><i class="fa-solid fa-shield-halved" aria-hidden="true"></i></div>
          <h3 data-translate="accessControlTitle"></h3>
          <p data-translate="accessControlDesc"></p>
        </div>
        <div class="feature-detail-card">
          <div class="feature-icon"><i class="fa-solid fa-history" aria-hidden="true"></i></div>
          <h3 data-translate="versionControlTitle"></h3>
          <p data-translate="versionControlDesc"></p>
        </div>
      </div>
    </section>

    <!-- How It Works -->
    <section class="how-it-works">
      <h2 data-translate="howItWorksTitle"></h2>
      <div class="steps-container">
        <div class="step">
          <div class="step-number">1</div>
          <h3 data-translate="secureSetupTitle"></h3>
          <p data-translate="secureSetupDesc"></p>
        </div>
        <div class="step">
          <div class="step-number">2</div>
          <h3 data-translate="dataProtectionTitle"></h3>
          <p data-translate="dataProtectionDesc"></p>
        </div>
        <div class="step">
          <div class="step-number">3</div>
          <h3 data-translate="monitorAccessTitle"></h3>
          <p data-translate="monitorAccessDesc"></p>
        </div>
      </div>
    </section>

    <!-- Benefits -->
    <section class="benefits">
      <h2 data-translate="benefitsTitle"></h2>
      <div class="benefits-grid">
        <div class="benefit-card">
          <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
          <h3 data-translate="securityBenefit1Title"></h3>
          <p data-translate="securityBenefit1Desc"></p>
        </div>
        <div class="benefit-card">
          <i class="fa-solid fa-user-shield" aria-hidden="true"></i>
          <h3 data-translate="securityBenefit2Title"></h3>
          <p data-translate="securityBenefit2Desc"></p>
        </div>
        <div class="benefit-card">
          <i class="fa-solid fa-clipboard-check" aria-hidden="true"></i>
          <h3 data-translate="securityBenefit3Title"></h3>
          <p data-translate="securityBenefit3Desc"></p>
        </div>
      </div>
    </section>

    <!-- CTA Section -->
    <section class="feature-cta">
      <h2 data-translate="securityCtaTitle"></h2>
      <p data-translate="securityCtaText"></p>
      <button class="cta-btn" onclick="toggleModal(true)" data-translate="joinEarlyAccess"></button>
    </section>

    <div id="footer-container"></div>
    <script>
      fetch('../footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-container').innerHTML = data;
        });
    </script>

    <div id="popup-root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="../main.js"></script>
    <script src="../popup.js"></script>
    <script src="../lang.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
      });
    </script>
  </body>
</html>
