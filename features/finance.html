<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Finance - Construction Sourcing" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0f0e17" />
<title data-translate="financeTitle">Finance - Construction Sourcing</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/Favicon.svg" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <div class="scroll-progress"><div class="scroll-progress__bar"></div></div>
    <div id="header-container"></div>
    <script>
      fetch('../header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-container').innerHTML = data;
        });
    </script>

    <!-- Hero Section -->
    <section class="pricing-hero">
      <div class="pricing-hero-content">
        <h1 data-translate="financeTitle"></h1>
        <p class="pricing-hero-subtitle" data-translate="financeIntro"></p>
        <div class="pricing-hero-features">
          <div class="feature-item">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span data-translate="financeUSP1"></span>
          </div>
          <div class="feature-item">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span data-translate="financeUSP2"></span>
          </div>
          <div class="feature-item">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span data-translate="financeUSP3"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Feature Details -->
    <section class="feature-detail-section">
      <h2 data-translate="financeFeaturesTitle"></h2>
      <p class="feature-detail-intro" data-translate="financeIntro"></p>
      <div class="feature-details-grid">
        <div class="feature-detail-card">
          <div class="feature-icon"><i class="fa-solid fa-money-bill-trend-up" aria-hidden="true"></i></div>
          <h3 data-translate="budgetTrackingTitle"></h3>
          <p data-translate="budgetTrackingDesc"></p>
        </div>
        <div class="feature-detail-card">
          <div class="feature-icon"><i class="fa-solid fa-credit-card" aria-hidden="true"></i></div>
          <h3 data-translate="paymentAutomationTitle"></h3>
          <p data-translate="paymentAutomationDesc"></p>
        </div>
        <div class="feature-detail-card">
          <div class="feature-icon"><i class="fa-solid fa-file-invoice-dollar" aria-hidden="true"></i></div>
          <h3 data-translate="financialReportingTitle"></h3>
          <p data-translate="financialReportingDesc"></p>
        </div>
      </div>
    </section>

    <!-- How It Works -->
    <section class="how-it-works">
      <h2 data-translate="howItWorksTitle"></h2>
      <div class="steps-container">
        <div class="step">
          <div class="step-number">1</div>
          <h3 data-translate="budgetSetupTitle"></h3>
          <p data-translate="budgetSetupDesc"></p>
        </div>
        <div class="step">
          <div class="step-number">2</div>
          <h3 data-translate="expenseTrackingTitle"></h3>
          <p data-translate="expenseTrackingDesc"></p>
        </div>
        <div class="step">
          <div class="step-number">3</div>
          <h3 data-translate="financialAnalysisTitle"></h3>
          <p data-translate="financialAnalysisDesc"></p>
        </div>
      </div>
    </section>

    <!-- Benefits -->
    <section class="benefits">
      <h2 data-translate="benefitsTitle"></h2>
      <div class="benefits-grid">
        <div class="benefit-card">
          <i class="fa-solid fa-money-bill-trend-up" aria-hidden="true"></i>
          <h3 data-translate="financeBenefit1Title"></h3>
          <p data-translate="financeBenefit1Desc"></p>
        </div>
        <div class="benefit-card">
          <i class="fa-solid fa-clock" aria-hidden="true"></i>
          <h3 data-translate="financeBenefit2Title"></h3>
          <p data-translate="financeBenefit2Desc"></p>
        </div>
        <div class="benefit-card">
          <i class="fa-solid fa-chart-line" aria-hidden="true"></i>
          <h3 data-translate="financeBenefit3Title"></h3>
          <p data-translate="financeBenefit3Desc"></p>
        </div>
      </div>
    </section>

    <!-- CTA Section -->
    <section class="feature-cta">
      <h2 data-translate="financeCtaTitle"></h2>
      <p data-translate="financeCtaText"></p>
      <button class="cta-btn" onclick="toggleModal(true)" data-translate="joinEarlyAccess"></button>
    </section>

    <div id="footer-container"></div>
    <script>
      fetch('../footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-container').innerHTML = data;
        });
    </script>

    <div id="popup-root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="../main.js"></script>
    <script src="../popup.js"></script>
    <script src="../lang.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
      });
    </script>
  </body>
</html>
