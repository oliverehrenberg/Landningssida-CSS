<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Delta i våra webinarier för fördjupade sessioner om hur du använder vår plattform." />
  <title data-translate="webinarsPageTitle"></title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="assets/Favicon.svg" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</head>
<body>
  <div class="scroll-progress" role="region" aria-label="Scroll progress">
    <div class="scroll-progress__bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
  </div>
  <div id="header-container"></div>
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <ol>
      <li><a href="index.html" data-translate="breadcrumbHome"></a></li>
      <li data-translate="footerWebinars"></li>
    </ol>
  </nav>

  <section class="content-section webinars">
    <h1 data-translate="webinarsPageTitle"></h1>
    <p data-translate="webinarsPageText"></p>
  </section>

  <div class="section-divider"></div>
  <div id="cta-container"></div>
  <div class="section-divider"></div>
  <div id="footer-container"></div>

  <div id="popup-root">
    <div class="popup-overlay" id="newsletterModal" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
      <div class="popup-box">
        <button class="close-btn" onclick="toggleModal(false)" data-translate="closeButton" aria-label="closeButton"></button>
        <h3 id="popupTitle" data-translate="popupTitle"></h3>
        <form class="popup-form">
          <input type="email" placeholder="" data-translate="popupEmailPlaceholder" required />
          <div class="phone-input">
            <select id="countrySelect" onchange="updateFlagAndCode()">
              <option value="se" data-code="46" data-translate="countrySE"></option>
              <option value="dk" data-code="45" data-translate="countryDK"></option>
              <option value="no" data-code="47" data-translate="countryNO"></option>
              <option value="fi" data-code="358" data-translate="countryFI"></option>
              <option value="de" data-code="49" data-translate="countryDE"></option>
              <option value="fr" data-code="33" data-translate="countryFR"></option>
              <option value="es" data-code="34" data-translate="countryES"></option>
              <option value="it" data-code="39" data-translate="countryIT"></option>
              <option value="nl" data-code="31" data-translate="countryNL"></option>
              <option value="be" data-code="32" data-translate="countryBE"></option>
            </select>
            <input type="tel" id="phoneNumber" placeholder="" data-translate="popupPhonePlaceholder" required />
          </div>
          <button type="submit" class="submit-btn" data-translate="popupSubmit"></button>
          <button type="button" class="decline-btn" onclick="toggleModal(false)" data-translate="popupDecline"></button>
        </form>
        <p class="disclaimer" data-translate="popupDisclaimer"></p>
      </div>
    </div>
    <div class="popup-overlay" id="confirmationPopup" role="dialog" aria-modal="true" aria-labelledby="confirmationTitle">
      <div class="popup-box">
        <h3 id="confirmationTitle" data-translate="confirmationTitle"></h3>
        <p data-translate="confirmationText"></p>
        <button class="submit-btn" onclick="toggleConfirmation(false)" data-translate="confirmationClose"></button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
  <script src="lang.js"></script>
  <script src="main.js"></script>
  <script src="popup.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      const savedLanguage = localStorage.getItem('language') || 'sv';
      document.querySelectorAll('[data-translate]').forEach(el => {
        const key = el.getAttribute('data-translate');
        if (translations[savedLanguage][key]) el.innerHTML = translations[savedLanguage][key];
      });
    });
  </script>
</body>
</html>
