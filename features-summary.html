<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-translate="featuresSummaryTitle">Funktioner - Construction Sourcing</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="assets/Favicon.svg" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
      .features-summary-wrapper { min-height: auto; justify-content: flex-start; }
      .features-steps-header { text-align: center; margin-bottom: 0.5rem; }
      .features-steps-header h2 { margin-bottom: 0.25rem; }
    </style>
  </head>
  <body>
    <div class="scroll-progress"><div class="scroll-progress__bar"></div></div>
    <div id="header-container"></div>
    <script>
      fetch('header.html').then(r => r.text()).then(data => { document.getElementById('header-container').innerHTML = data; });
    </script>

    <section class="pricing-hero">
      <div class="pricing-hero-content">
        <h1 data-translate="featureTitle"></h1>
        <p class="pricing-hero-subtitle" data-translate="featureIntro"></p>
        <div class="pricing-hero-features">
          <div class="feature-item">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span data-translate="featuresUSP1"></span>
          </div>
          <div class="feature-item">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span data-translate="featuresUSP2"></span>
          </div>
          <div class="feature-item">
            <i class="fas fa-check-circle" aria-hidden="true"></i>
            <span data-translate="featuresUSP3"></span>
          </div>
        </div>
      </div>
    </section>

    <section class="features-summary-wrapper" id="funktioner">
      <div class="features-steps-header">
        <h2 data-translate="featuresStepsTitle"></h2>
        <p class="pricing-hero-subtitle" data-translate="featuresSummaryIntro"></p>
      </div>
      <div class="use-cases-carousel" aria-label="Steg i arbetsflödet" aria-live="polite">
        <div class="carousel-track">
          <div class="use-case-card" data-step="1">
            <div class="use-case-visual"><img src="assets/leverantorer-step01-alla-företag.png" alt="Steg 1" /></div>
            <div class="use-case-content">
              <h4 data-translate="step1DetailTitle"></h4>
              <p data-translate="featuresSummaryStep1Desc"></p>
              <ul class="features-list">
                <li data-translate="step1HeroFeatureSearchTitle"></li>
                <li data-translate="step1HeroFeatureFilterTitle"></li>
                <li data-translate="step1HeroFeatureListTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step1-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="2">
            <div class="use-case-visual"><img src="assets/leverantorer-step02-info.png" alt="Steg 2" /></div>
            <div class="use-case-content">
              <h4 data-translate="step2DetailTitle"></h4>
              <p data-translate="featuresSummaryStep2Desc"></p>
              <ul class="features-list">
                <li data-translate="step2HeroFeatureInfoTitle"></li>
                <li data-translate="step2HeroFeatureRatingsTitle"></li>
                <li data-translate="step2HeroFeatureCertsTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step2-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="3">
            <div class="use-case-visual"><img src="assets/leverantorer-step03-förslag.png" alt="Steg 3" /></div>
            <div class="use-case-content">
              <h4 data-translate="step3DetailTitle"></h4>
              <p data-translate="featuresSummaryStep3Desc"></p>
              <ul class="features-list">
                <li data-translate="step3HeroFeatureMessagingTitle"></li>
                <li data-translate="step3HeroFeatureQuotesTitle"></li>
                <li data-translate="step3HeroFeatureConversationsTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step3-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="4">
            <div class="use-case-visual"><img src="assets/create_new_project.png" alt="Steg 4" /></div>
            <div class="use-case-content">
              <h4 data-translate="step4DetailTitle"></h4>
              <p data-translate="featuresSummaryStep4Desc"></p>
              <ul class="features-list">
                <li data-translate="step4HeroFeatureFormTitle"></li>
                <li data-translate="step4HeroFeatureManagerTitle"></li>
                <li data-translate="step4HeroFeatureSettingsTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step4-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="5">
            <div class="use-case-visual"><img src="assets/send quote request.png" alt="Steg 5" /></div>
            <div class="use-case-content">
              <h4 data-translate="step5DetailTitle"></h4>
              <p data-translate="featuresSummaryStep5Desc"></p>
              <ul class="features-list">
                <li data-translate="step5HeroFeatureRequirementsTitle"></li>
                <li data-translate="step5HeroFeatureSuppliersTitle"></li>
                <li data-translate="step5HeroFeatureRequestsTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step5-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="6">
            <div class="use-case-visual"><img src="assets/6_send quote.png" alt="Steg 6" /></div>
            <div class="use-case-content">
              <h4 data-translate="step6DetailTitle"></h4>
              <p data-translate="featuresSummaryStep6Desc"></p>
              <ul class="features-list">
                <li data-translate="step6HeroFeatureReviewTitle"></li>
                <li data-translate="step6HeroFeatureCreateTitle"></li>
                <li data-translate="step6HeroFeatureCommunicationTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step6-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="7">
            <div class="use-case-visual"><img src="assets/create_agreement.png" alt="Steg 7" /></div>
            <div class="use-case-content">
              <h4 data-translate="step7DetailTitle"></h4>
              <p data-translate="featuresSummaryStep7Desc"></p>
              <ul class="features-list">
                <li data-translate="step7HeroFeatureAcceptTitle"></li>
                <li data-translate="step7HeroFeatureTermsTitle"></li>
                <li data-translate="step7HeroFeatureAgreementsTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step7-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="8">
            <div class="use-case-visual"><img src="assets/agreement.png" alt="Steg 8" /></div>
            <div class="use-case-content">
              <h4 data-translate="step8DetailTitle"></h4>
              <p data-translate="featuresSummaryStep8Desc"></p>
              <ul class="features-list">
                <li data-translate="step8HeroFeatureReviewTitle"></li>
                <li data-translate="step8HeroFeatureSigningTitle"></li>
                <li data-translate="step8HeroFeatureBindingTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step8-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="9">
            <div class="use-case-visual"><img src="assets/mission.png" alt="Steg 9" /></div>
            <div class="use-case-content">
              <h4 data-translate="step9DetailTitle"></h4>
              <p data-translate="featuresSummaryStep9Desc"></p>
              <ul class="features-list">
                <li data-translate="step9HeroFeatureProgressTitle"></li>
                <li data-translate="step9HeroFeatureDeliveriesTitle"></li>
                <li data-translate="step9HeroFeatureQualityTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step9-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="10">
            <div class="use-case-visual"><img src="assets/all-agreement.png" alt="Steg 10" /></div>
            <div class="use-case-content">
              <h4 data-translate="step10DetailTitle"></h4>
              <p data-translate="featuresSummaryStep10Desc"></p>
              <ul class="features-list">
                <li data-translate="step10HeroFeatureListTitle"></li>
                <li data-translate="step10HeroFeatureFilterTitle"></li>
                <li data-translate="step10HeroFeatureSearchTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step10-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
          <div class="use-case-card" data-step="11">
            <div class="use-case-visual"><img src="assets/document.png" alt="Steg 11" /></div>
            <div class="use-case-content">
              <h4 data-translate="step11DetailTitle"></h4>
              <p data-translate="featuresSummaryStep11Desc"></p>
              <ul class="features-list">
                <li data-translate="step11HeroFeatureUploadTitle"></li>
                <li data-translate="step11HeroFeatureOrganizeTitle"></li>
                <li data-translate="step11HeroFeatureSearchTitle"></li>
              </ul>
              <button class="expand-btn" onclick="window.open('features/step11-details.html','_blank')" data-translate="readMore"></button>
            </div>
          </div>
        </div>
        <button class="carousel-prev" aria-label="Föregående" tabindex="0"><i data-lucide="chevron-left"></i></button>
        <button class="carousel-next" aria-label="Nästa" tabindex="0"><i data-lucide="chevron-right"></i></button>
      </div>
    </section>

    <section class="pricing-faq" aria-labelledby="faq-title">
      <h2 id="faq-title" data-translate="featuresFaqTitle"></h2>
      <div class="faq-container">
        <div class="faq-item">
          <div class="faq-question" tabindex="0" aria-expanded="false" aria-controls="faq1-answer">
            <h3 data-translate="featuresFaqQ1"></h3>
            <i class="fas fa-chevron-down" aria-hidden="true"></i>
          </div>
          <div class="faq-answer" id="faq1-answer">
            <p data-translate="featuresFaqA1"></p>
          </div>
        </div>
        <div class="faq-item">
          <div class="faq-question" tabindex="0" aria-expanded="false" aria-controls="faq2-answer">
            <h3 data-translate="featuresFaqQ2"></h3>
            <i class="fas fa-chevron-down" aria-hidden="true"></i>
          </div>
          <div class="faq-answer" id="faq2-answer">
            <p data-translate="featuresFaqA2"></p>
          </div>
        </div>
        <div class="faq-item">
          <div class="faq-question" tabindex="0" aria-expanded="false" aria-controls="faq3-answer">
            <h3 data-translate="featuresFaqQ3"></h3>
            <i class="fas fa-chevron-down" aria-hidden="true"></i>
          </div>
          <div class="faq-answer" id="faq3-answer">
            <p data-translate="featuresFaqA3"></p>
          </div>
        </div>
      </div>
    </section>

    <section class="features-cta">
      <div class="features-cta-icon" aria-hidden="true"><i class="fa-solid fa-shield-halved"></i></div>
      <h2 data-translate="featuresCtaTitle"></h2>
      <p data-translate="featuresCtaText"></p>
      <p class="features-cta-security" data-translate="featuresCtaSecurity"></p>
      <button class="cta-btn" onclick="toggleModal(true)" data-translate="featuresCtaBtn"></button>
    </section>

    <div class="section-divider"></div>
    <div id="footer-container"></div>

    <div id="popup-root">
      <div class="popup-overlay" id="newsletterModal" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
        <div class="popup-box">
          <button class="close-btn" onclick="toggleModal(false)" data-translate="closeButton"></button>
          <h3 id="popupTitle" data-translate="popupTitle"></h3>
          <form class="popup-form">
            <input type="email" placeholder="" data-translate="popupEmailPlaceholder" required />
            <div class="phone-input">
              <select id="countrySelect" onchange="updateFlagAndCode()">
                <option value="se" data-code="46" data-translate="countrySE"></option>
                <option value="dk" data-code="45" data-translate="countryDK"></option>
                <option value="no" data-code="47" data-translate="countryNO"></option>
                <option value="fi" data-code="358" data-translate="countryFI"></option>
                <option value="de" data-code="49" data-translate="countryDE"></option>
                <option value="fr" data-code="33" data-translate="countryFR"></option>
                <option value="es" data-code="34" data-translate="countryES"></option>
                <option value="it" data-code="39" data-translate="countryIT"></option>
                <option value="nl" data-code="31" data-translate="countryNL"></option>
                <option value="be" data-code="32" data-translate="countryBE"></option>
              </select>
              <input type="tel" id="phoneNumber" placeholder="" data-translate="popupPhonePlaceholder" required />
            </div>
            <button type="submit" class="submit-btn" data-translate="popupSubmit"></button>
            <button type="button" class="decline-btn" onclick="toggleModal(false)" data-translate="popupDecline"></button>
          </form>
          <p class="disclaimer" data-translate="popupDisclaimer"></p>
        </div>
      </div>
      <div class="popup-overlay" id="confirmationPopup">
        <div class="popup-box">
          <h3 data-translate="confirmationTitle"></h3>
          <p data-translate="confirmationText"></p>
          <button class="submit-btn" onclick="toggleConfirmation(false)" data-translate="confirmationClose"></button>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
    <script src="lang.js"></script>
    <script src="main.js"></script>
    <script src="popup.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
      });
    </script>
  </body>
</html>
